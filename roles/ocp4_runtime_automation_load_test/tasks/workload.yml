---
# =============================================================================
# ocp4_runtime_automation_load_test
# Trigger solve + validate on all modules via SSE /stream/ API
# =============================================================================

- name: Get showroom route
  kubernetes.core.k8s_info:
    host: "{{ zt_load_test_ocp_openshift_api_url | default(omit) }}"
    api_key: "{{ zt_load_test_ocp_openshift_api_token | default(omit) }}"
    validate_certs: false
    api_version: route.openshift.io/v1
    kind: Route
    namespace: "{{ zt_load_test_ocp_showroom_namespace }}"
  register: r_route

- name: Fail if showroom route not found
  ansible.builtin.fail:
    msg: "Showroom route not found in {{ zt_load_test_ocp_showroom_namespace }} — is showroom deployed?"
  when: r_route.resources | length == 0

- name: Set runner base URL (SSE /stream/ API)
  ansible.builtin.set_fact:
    _runner_url: "https://{{ r_route.resources[0].spec.host }}/stream"

- name: Wait for runner to be ready
  ansible.builtin.uri:
    url: "{{ _runner_url }}/health"
    validate_certs: false
    status_code: 200
  register: r_health
  retries: "{{ (zt_load_test_ocp_wait_seconds | int / 10) | int }}"
  delay: 10
  until: r_health.status == 200

- name: Get available modules
  ansible.builtin.uri:
    url: "{{ _runner_url }}/config"
    validate_certs: false
    status_code: 200
  register: r_config

- name: Set modules list
  ansible.builtin.set_fact:
    _modules: "{{ r_config.json.keys() | list | sort }}"

- name: "Run solve on all modules: {{ _modules }}"
  ansible.builtin.shell:
    cmd: >-
      curl -sk -N --max-time {{ zt_load_test_ocp_module_timeout }}
      "{{ _runner_url }}/solve/{{ item }}"
  register: r_solve_results
  loop: "{{ _modules }}"
  loop_control:
    label: "{{ item }}"
  ignore_errors: true

- name: "Run validate on all modules: {{ _modules }}"
  ansible.builtin.shell:
    cmd: >-
      curl -sk -N --max-time {{ zt_load_test_ocp_module_timeout }}
      "{{ _runner_url }}/validate/{{ item }}"
  register: r_val_results
  loop: "{{ _modules }}"
  loop_control:
    label: "{{ item }}"
  ignore_errors: true

- name: Build solve results summary
  ansible.builtin.set_fact:
    _solve_summary: >-
      {{ dict(_modules | zip(
           r_solve_results.results
           | map(attribute='stdout', default='')
           | map('regex_search', 'Completed successfully|\u2713|Failed|\u2717')
           | map('default', 'unknown', true)
         )) }}

- name: Build validate results summary
  ansible.builtin.set_fact:
    _val_summary: >-
      {{ dict(_modules | zip(
           r_val_results.results
           | map(attribute='stdout', default='')
           | map('regex_search', 'Completed successfully|\u2713|Failed|\u2717')
           | map('default', 'unknown', true)
         )) }}

- name: Build overall pass/fail status
  ansible.builtin.set_fact:
    _all_passed: >-
      {{ 'Failed' not in (_solve_summary.values() | list | join(' ')) and
         'Failed' not in (_val_summary.values() | list | join(' ')) and
         'unknown' not in (_val_summary.values() | list) }}

- name: Report load test results
  agnosticd.core.agnosticd_user_info:
    data:
      e2e_status: "{{ '✅ ALL PASSED' if _all_passed else '❌ FAILURES DETECTED' }}"
      e2e_solve: "{{ _solve_summary }}"
      e2e_validate: "{{ _val_summary }}"
    msg: |
      ═══════════════════════════════════════
      E2E Load Test — {{ 'ALL PASSED ✅' if _all_passed else 'FAILURES ❌' }}
      ═══════════════════════════════════════
      {% for m in _modules %}
      {{ m }}:
        Solve:    {{ _solve_summary[m] | default('unknown') }}
        Validate: {{ _val_summary[m] | default('unknown') }}
      {% endfor %}
      ═══════════════════════════════════════
  ignore_errors: true

- name: Log E2E load test failures (non-blocking)
  ansible.builtin.debug:
    msg: >-
      ⚠️ E2E load test issues detected (provision continues):
      Solve:    {{ _solve_summary }}
      Validate: {{ _val_summary }}
  when: >-
    '✗ Failed' in (_solve_summary.values() | list) or
    '✗ Failed' in (_val_summary.values() | list) or
    'unknown' in (_val_summary.values() | list)
