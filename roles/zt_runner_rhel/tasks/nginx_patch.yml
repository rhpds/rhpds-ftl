---
# Same nginx patch as OCP mode — /runner route to port 8501
- name: Patch showroom nginx configmap with /runner route
  kubernetes.core.k8s:
    host: "{{ zt_runner_rhel_openshift_api_url | default(omit) }}"
    api_key: "{{ zt_runner_rhel_openshift_api_token | default(omit) }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: showroom-proxy-config
        namespace: "{{ zt_runner_rhel_showroom_namespace }}"
      data:
        nginx.conf: |
          events {}
          error_log /dev/stdout info;
          http {
            include /etc/nginx/mime.types;
            proxy_cache off;
            expires -1;
            proxy_cache_path /dev/null keys_zone=mycache:10m;
            map $http_upgrade $connection_upgrade {
                default upgrade;
                '' close;
            }
            server {
              listen 8080;
              absolute_redirect off;
              location / {
                proxy_pass http://127.0.0.1:8000;
                expires off;
                proxy_cache off;
                proxy_pass_request_headers on;
                proxy_set_header Accept-Encoding "gzip";
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
              }
              location ^~ /runner {
                rewrite ^/runner(/.*)$ $1 break;
                proxy_pass http://127.0.0.1:8501/;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection $connection_upgrade;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
              }
              location = /healthz { proxy_pass http://127.0.0.1:8090/healthz; }
              location = /readyz { proxy_pass http://127.0.0.1:8090/readyz; }
            }
          }
