---
- name: Patch nginx configmap with /runner route
  ansible.builtin.include_tasks: nginx_patch.yml

- name: Add runner container to showroom deployment (RHEL/SSH mode)
  ansible.builtin.include_tasks: deployment_patch.yml

- name: Generate and emit test report
  when: zt_runner_generate_report | default(true) | bool
  ansible.builtin.include_tasks: report.yml

- name: Report zt_runner_rhel complete
  ansible.builtin.debug:
    msg: >-
      ZT runner (RHEL mode) deployed in {{ zt_runner_rhel_showroom_namespace }}.
      Runner image: {{ zt_runner_rhel_image }}
      Bastion: {{ zt_runner_rhel_bastion_host }}:{{ zt_runner_rhel_bastion_port }}
