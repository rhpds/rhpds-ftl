---
# SA and Secrets in showroom namespace are deleted automatically when
# the showroom namespace itself is deleted by ocp4_workload_showroom remove.
# Only the ClusterRoleBinding (dedicated mode) needs explicit cleanup.

- name: Delete cluster-admin ClusterRoleBinding (dedicated mode only)
  when: ocp4_workload_runtime_automation_k8s_cluster_admin | bool
  kubernetes.core.k8s:
    host: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_url | default(omit) }}"
    api_key: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_token | default(omit) }}"
    validate_certs: false
    state: absent
    api_version: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    name: "zt-runner-{{ guid }}"
