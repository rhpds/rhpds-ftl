---
# =============================================================================
# ocp4_workload_runtime_automation_k8s
#
# Two modes (ocp4_workload_runtime_automation_k8s_cluster_admin):
#
# false (default) — Multi-user namespace labs:
#   Creates a scoped SA + token in each student namespace.
#   Kubeconfig only has access to student namespaces.
#   Admin token used only at provision time, never in showroom.
#
# true — Dedicated cluster labs (student = cluster-admin):
#   Stores cluster-admin kubeconfig directly.
#   Developer can use impersonate_user: in playbooks to test non-admin scenarios.
#   Secure because student owns the dedicated cluster anyway.
#
# In both cases: kubeconfig stored as Secret in showroom namespace.
# jobs.py reads it at job start, passes path as {{ k8s_kubeconfig }} extravar.
# =============================================================================

# ── Dedicated cluster mode: store cluster-admin kubeconfig ───────────────────
- name: Store cluster-admin kubeconfig in showroom namespace (dedicated mode)
  when: ocp4_workload_runtime_automation_k8s_cluster_admin | bool
  kubernetes.core.k8s:
    host: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_url | default(omit) }}"
    api_key: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_token | default(omit) }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ ocp4_workload_runtime_automation_k8s_secret_name }}"
        namespace: "{{ ocp4_workload_runtime_automation_k8s_showroom_namespace }}"
        labels:
          created-by: rhpds-ftl
          guid: "{{ guid }}"
          mode: cluster-admin
      stringData:
        kubeconfig: |
          apiVersion: v1
          kind: Config
          clusters:
          - name: cluster
            cluster:
              server: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_url }}"
              insecure-skip-tls-verify: true
          contexts:
          - name: admin
            context:
              cluster: cluster
              user: admin
          current-context: admin
          users:
          - name: admin
            user:
              token: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_token }}"

# ── Multi-user namespace mode: create scoped SA + token ──────────────────────
- name: Create zt-runner ServiceAccount in each student namespace
  when: not (ocp4_workload_runtime_automation_k8s_cluster_admin | bool)
  kubernetes.core.k8s:
    host: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_url | default(omit) }}"
    api_key: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_token | default(omit) }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: "{{ ocp4_workload_runtime_automation_k8s_sa_name }}"
        namespace: "{{ ocp4_workload_runtime_automation_k8s_username }}-{{ item.suffix }}"
        labels:
          created-by: rhpds-ftl
          guid: "{{ guid }}"
  loop: "{{ ocp4_workload_runtime_automation_k8s_namespace_suffixes }}"
  loop_control:
    label: "{{ ocp4_workload_runtime_automation_k8s_username }}-{{ item.suffix }}"

- name: Grant zt-runner SA admin in each student namespace
  when: not (ocp4_workload_runtime_automation_k8s_cluster_admin | bool)
  kubernetes.core.k8s:
    host: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_url | default(omit) }}"
    api_key: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_token | default(omit) }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: "{{ ocp4_workload_runtime_automation_k8s_sa_name }}-admin"
        namespace: "{{ ocp4_workload_runtime_automation_k8s_username }}-{{ item.suffix }}"
        labels:
          created-by: rhpds-ftl
          guid: "{{ guid }}"
      subjects:
        - kind: ServiceAccount
          name: "{{ ocp4_workload_runtime_automation_k8s_sa_name }}"
          namespace: "{{ ocp4_workload_runtime_automation_k8s_username }}-{{ item.suffix }}"
      roleRef:
        kind: ClusterRole
        name: admin
        apiGroup: rbac.authorization.k8s.io
  loop: "{{ ocp4_workload_runtime_automation_k8s_namespace_suffixes }}"
  loop_control:
    label: "{{ ocp4_workload_runtime_automation_k8s_username }}-{{ item.suffix }}"

# No long-lived token stored — jobs.py calls TokenRequest API per job (1h tokens).
# Store SA location metadata in showroom namespace ConfigMap so jobs.py knows
# which SA + namespace to request a token for.
- name: Store zt-runner SA metadata in showroom namespace
  when: not (ocp4_workload_runtime_automation_k8s_cluster_admin | bool)
  kubernetes.core.k8s:
    host: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_url | default(omit) }}"
    api_key: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_token | default(omit) }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: zt-runner-sa-config
        namespace: "{{ ocp4_workload_runtime_automation_k8s_showroom_namespace }}"
        labels:
          created-by: rhpds-ftl
          guid: "{{ guid }}"
      data:
        sa_name: "{{ ocp4_workload_runtime_automation_k8s_sa_name }}"
        sa_namespace: "{{ ocp4_workload_runtime_automation_k8s_username }}-{{ ocp4_workload_runtime_automation_k8s_namespace_suffixes[0].suffix }}"
        api_url: "{{ ocp4_workload_runtime_automation_k8s_openshift_api_url | default('https://kubernetes.default.svc') }}"
        mode: "namespace"
