---
# =============================================================================
# vm_workload_runtime_automation
#
# Runs on the bastion AFTER vm_workload_showroom.
# Prepares the ansible-runner-api container for ZT grading:
#   1. Copies the lab SSH key so the runner can SSH to nodes
#   2. Resolves node IPs via bastion DNS (getent hosts) and injects
#      into the runner container's /etc/hosts
# =============================================================================

- name: Copy lab SSH key to showroom .ssh directory
  become: true
  ansible.builtin.copy:
    src: "{{ vm_workload_runtime_automation_ssh_key_src }}"
    dest: "{{ vm_workload_runtime_automation_ssh_key_dest }}"
    owner: "{{ vm_workload_runtime_automation_showroom_user }}"
    group: "{{ vm_workload_runtime_automation_showroom_user }}"
    mode: '0600'
    remote_src: true

- name: Build node hostname list from inventory groups
  ansible.builtin.set_fact:
    _zt_node_names: >-
      {%- set result = [] -%}
      {%- for group in vm_workload_runtime_automation_node_groups -%}
        {%- for node in groups[group] | default([]) -%}
          {%- set _ = result.append(node) -%}
        {%- endfor -%}
      {%- endfor -%}
      {{ result }}

- name: Resolve node IPs via bastion DNS
  ansible.builtin.command: getent hosts {{ item }}
  loop: "{{ _zt_node_names }}"
  register: r_getent
  failed_when: false
  changed_when: false

- name: Inject node entries into runner container /etc/hosts
  become: true
  become_user: "{{ vm_workload_runtime_automation_showroom_user }}"
  ansible.builtin.shell: >-
    podman exec {{ vm_workload_runtime_automation_runner_container }}
    sh -c "grep -q ' {{ item.item }}$' /etc/hosts ||
           echo '{{ item.stdout.split()[0] }} {{ item.item }}' >> /etc/hosts"
  loop: "{{ r_getent.results }}"
  when:
    - item.rc == 0
    - item.stdout != ''
  loop_control:
    label: "{{ item.item }} -> {{ item.stdout.split()[0] if item.stdout else 'unresolved' }}"
